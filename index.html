<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 機器模型 線上展示</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f4f6f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 滿版 3D 播放器容器 */
        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
        }

        /* 頂部標題與說明 */
        .header-info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            max-width: 320px;
            pointer-events: none;
            /* 防止干擾 3D 旋轉 */
        }

        .header-info h1 {
            font-size: 18px;
            color: #1d1d1f;
            margin-bottom: 4px;
        }

        .header-info p {
            font-size: 12px;
            color: #86868b;
            line-height: 1.4;
        }

        /* 自訂內建進度條（讀取 67MB 檔案時非常需要） */
        .progress-bar {
            display: block;
            width: 33%;
            height: 4px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            overflow: hidden;
        }

        .progress-bar.hide {
            display: none;
        }

        .update-bar {
            width: 0%;
            height: 100%;
            background: #007aff;
            transition: width 0.3s;
        }
    </style>
</head>

<body>

    <div class="header-info">
        <h1>Ctrl CV 機器模型展示</h1>
        <p>滑鼠拖曳可旋轉視角，滾輪可放大縮小模型。</p>
    </div>

    <model-viewer src="model.glb" camera-controls touch-action="pan-y" tone-mapping="neutral" shadow-intensity="0.0"
        power-preference="high-performance">

        <div class="progress-bar" slot="progress-bar">
            <div class="update-bar"></div>
        </div>

    </model-viewer>

    <script>
        const modelViewer = document.querySelector('model-viewer');
        const progressBar = document.querySelector('.progress-bar');
        const updatingBar = document.querySelector('.update-bar');

        // 監聽 3D 模型的載入進度
        modelViewer.addEventListener('progress', (event) => {
            const progress = event.detail.totalProgress;
            progressBar.classList.remove('hide');

            if (updatingBar) {
                updatingBar.style.width = `${progress * 100}%`;
            }

            if (progress === 1) {
                progressBar.classList.add('hide');
            }
        });
    </script>
</body>

</html>
